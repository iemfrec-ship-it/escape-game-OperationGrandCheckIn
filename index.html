<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏨 The Meridian Hotel — Escape Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0D1B3E;--nv2:#1B2F6B;--nvl:#E8EDF8;
  --gd:#B8972A;--gd2:#D4B44A;--gdl:#FAF6E4;
  --cr:#F8F5EF;--cr2:#EDE8DF;
  --red:#9B1C1C;--green:#1E5E32;
  --bg:linear-gradient(150deg,#F0EDE8 0%,#F8F5EF 50%,#EEF0F5 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;background-attachment:fixed;color:#222}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.page{max-width:800px;margin:0 auto;padding:16px 18px 44px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(13,27,62,.07);padding:22px;margin-bottom:13px}
.card-nv{border-top:3px solid var(--nv)}
.card-gd{border-top:3px solid var(--gd)}
.card-rd{border-top:3px solid var(--red)}
/* ─ Buttons ─ */
.btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;border-radius:8px;padding:10px 22px;font-size:.87rem;display:inline-flex;align-items:center;gap:6px;transition:transform .12s,box-shadow .12s,background .12s;letter-spacing:.01em}
.btn:active{transform:scale(.96)!important}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none!important}
.btn-nv{background:var(--nv);color:#fff;box-shadow:0 3px 0 #060F24}
.btn-nv:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 0 #060F24}
.btn-gd{background:var(--gd);color:#fff;box-shadow:0 3px 0 #7A6118}
.btn-gd:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 0 #7A6118}
.btn-red{background:var(--red);color:#fff;box-shadow:0 3px 0 #5C0E0E}
.btn-red:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 0 #5C0E0E}
.btn-green{background:var(--green);color:#fff;box-shadow:0 3px 0 #0D3318}
.btn-green:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 0 #0D3318}
.btn-gray{background:#E4E4E4;color:#555}
.btn-gray:hover:not(:disabled){background:#D5D5D5}
.btn-outline{background:transparent;color:rgba(255,255,255,.9);border:2px solid rgba(255,255,255,.55)}
.btn-outline:hover:not(:disabled){background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.85)}
.lg{font-size:.96rem;padding:13px 32px}
.sm{font-size:.76rem;padding:6px 13px}
.full{width:100%;justify-content:center}
/* ─ Header ─ */
.hdr{background:var(--nv);padding:11px 0;position:sticky;top:0;z-index:30;box-shadow:0 3px 14px rgba(13,27,62,.28)}
.hdr-in{max-width:800px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px}
/* ─ Progress ─ */
.pd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;transition:all .3s;flex-shrink:0}
.pd-done{background:var(--gd);color:#fff}
.pd-active{background:#fff;color:var(--nv);box-shadow:0 0 0 3px rgba(255,255,255,.3);animation:pls .9s ease-in-out infinite}
.pd-future{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4)}
.pl{flex:1;height:2px;margin:0 3px;transition:background .3s}
.plbl{font-size:.55rem;font-weight:700;color:rgba(255,255,255,.45);text-align:center;margin-top:2px}
/* ─ Score pill ─ */
.sc{background:linear-gradient(135deg,var(--gd),var(--gd2));color:#fff;padding:5px 15px;border-radius:50px;font-weight:800;font-size:.86rem;white-space:nowrap;box-shadow:0 2px 8px rgba(184,151,42,.35)}
/* ─ Input ─ */
input{font-family:'Inter',sans-serif;border:1.5px solid #D8D0C4;border-radius:8px;padding:10px 13px;font-size:.9rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;background:#FDFCFA}
input:focus{border-color:var(--nv);box-shadow:0 0 0 3px rgba(13,27,62,.1)}
/* ─ QCM ─ */
.opt{display:flex;align-items:center;gap:9px;padding:10px 14px;border:1.5px solid #E0D9D0;border-radius:10px;margin-bottom:7px;cursor:pointer;font-weight:600;font-size:.87rem;transition:all .15s}
.opt:hover{border-color:var(--nv2);background:var(--nvl)}
.opt.sel{border-color:var(--nv);background:#EEF1FA}
.opt.right{border-color:var(--green);background:#EEF5EE}
.opt.wrong{border-color:var(--red);background:#FBF0F0}
.let{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.73rem;font-weight:800;flex-shrink:0;transition:all .15s}
/* ─ V/F ─ */
.vfr{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid #E0D9D0;border-radius:10px;margin-bottom:7px;flex-wrap:wrap;transition:all .15s}
.tvf{padding:5px 13px;border-radius:6px;border:1.5px solid;cursor:pointer;font-weight:700;font-size:.78rem;transition:all .15s;font-family:'Inter',sans-serif}
/* ─ Matching ─ */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mi{padding:9px 12px;border:1.5px solid #E0D9D0;border-radius:10px;cursor:pointer;font-weight:600;font-size:.82rem;min-height:50px;display:flex;align-items:center;transition:all .15s;line-height:1.35}
.mi:hover:not(.mu):not(.mok):not(.mko){border-color:var(--gd);background:var(--gdl)}
.mi.msel{border-color:var(--gd);background:var(--gdl);box-shadow:0 0 0 3px rgba(184,151,42,.15)}
.mi.mu{opacity:.38;cursor:default;border-style:dashed}
.mi.mok{border-color:var(--green);background:#EEF5EE;opacity:1;cursor:default}
.mi.mko{border-color:var(--red);background:#FBF0F0;opacity:1;cursor:default}
/* ─ Situation ─ */
.sit{background:linear-gradient(135deg,#F0F2F8,#FAF6E4);border:1.5px solid var(--gd);border-radius:13px;padding:17px}
.slbl{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--gd);margin-bottom:2px}
.sval{font-weight:600;font-size:.89rem;margin-bottom:11px;line-height:1.5;color:#333}
.hint{background:var(--gdl);border:1.5px dashed var(--gd);border-radius:10px;padding:9px 13px;font-size:.82rem;font-weight:700;color:#6B4F10}
/* ─ Reading ─ */
.rtxt{background:#F8F6F2;border-left:3px solid var(--gd);padding:14px 16px;border-radius:0 10px 10px 0;font-size:.87rem;line-height:1.82;margin-bottom:13px;color:#333;font-style:italic}
/* ─ Indice ─ */
.ibx{background:linear-gradient(135deg,var(--nv),var(--nv2));border-radius:16px;padding:26px;text-align:center}
.iwd{font-family:'Cormorant Garamond',Georgia,serif;font-size:2.6rem;font-weight:700;color:#fff;letter-spacing:.06em;text-shadow:0 3px 0 rgba(0,0,0,.2)}
/* ─ Stars ─ */
.stars{font-size:1.4rem;letter-spacing:2px;color:var(--gd)}
/* ─ Achievement ─ */
.achv{background:linear-gradient(135deg,var(--nv),var(--nv2));border-radius:13px;padding:14px 18px;text-align:center;margin-bottom:11px}
/* ─ Banners ─ */
.ok{background:#EEF5EE;border:1.5px solid var(--green);border-radius:10px;padding:11px;font-weight:700;color:#1E4C28;font-size:.87rem}
.ko{background:#FBF0F0;border:1.5px solid var(--red);border-radius:10px;padding:11px;font-weight:700;color:#6B1212;font-size:.87rem}
/* ─ Modal / Animations ─ */
@keyframes fadein{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.fadein{animation:fadein .3s ease-out}
.chip{background:var(--nv);color:#fff;padding:3px 11px;border-radius:6px;font-weight:700;font-size:.77rem;display:inline-block;margin:2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--cr2),transparent);margin:18px 0}
@media(max-width:580px){.mg{grid-template-columns:1fr}.card{padding:16px;border-radius:11px}.iwd{font-size:1.9rem}.lg{font-size:.9rem;padding:11px 24px}}
@media print{.noprint{display:none!important}}
</style>
</head>

/* ═══════ QCM ═══════ */
function vQCM(){
  const{qs,cur=0,ans={},done=false}=E;if(!qs)return'';
  const q=qs[cur];const L='ABCD';const CC=['var(--nv)','var(--gd)','var(--red)','#6B3B8C'];
  const dots=qs.map((_,i)=>{const c=done?(ans[i]===qs[i].c?'var(--green)':'var(--red)'):(ans[i]!=null?'var(--nv)':'#D8D0C4');return`<div onclick="E.cur=${i};render()" style="width:8px;height:8px;border-radius:50%;background:${c};cursor:pointer;display:inline-block;margin:2px"></div>`;}).join('');
  const opts=q.o.map((opt,oi)=>{
    let bc='#E0D9D0',bg='#fff';
    if(ans[cur]===oi){bc='var(--nv)';bg='var(--nvl)';}
    if(done&&oi===q.c){bc='var(--green)';bg='#EEF5EE';}
    if(done&&ans[cur]===oi&&oi!==q.c){bc='var(--red)';bg='#FBF0F0';}
    const lbg=ans[cur]===oi?CC[oi]:'#ECE7E0',lc=ans[cur]===oi?'#fff':'#999';
    const mk=done?(oi===q.c?' ✓':(ans[cur]===oi?' ✗':'')):'';
    return`<div class="opt ${ans[cur]===oi?'sel':''} ${done&&oi===q.c?'right':''} ${done&&ans[cur]===oi&&oi!==q.c?'wrong':''}" onclick="${done?'':(`E.ans[${cur}]=${oi};render()`)}" style="border-color:${bc};background:${bg}">
      <div class="let" style="background:${lbg};color:${lc}">${L[oi]}</div>
      <span style="flex:1">${opt}</span>
      <span style="font-weight:800;color:${done&&oi===q.c?'var(--green)':'var(--red)'}">${mk}</span>
    </div>`;
  }).join('');
  const allA=Object.keys(ans).length===qs.length;
  const score=qs.filter((_,i)=>ans[i]===qs[i].c).length;
  const bot=done

    :(allA?btn('Valider mes réponses','E.done=true;render()','nv'):`<small style="color:#CCC;font-size:.78rem">${Object.keys(ans).length}/${qs.length} répondues</small>`);

function qcmDone(){
  const{qs,ans={},lbl=''}=E;
  const score=qs.filter((_,i)=>ans[i]===qs[i].c).length;
  const wrong=qs.flatMap((q,i)=>ans[i]!==q.c?[{level:lbl,question:q.q,given:ans[i]!=null?q.o[ans[i]]:'—',correct:q.o[q.c]}]:[]);
  S.wr.push(...wrong);
  if(S.scr==='l1q1'){S.res['M1-Ex1']={score,passed:pass(score)};if(pass(score)){S.pts+=50;go('l1d');}else go('l1q2',{qs:Q2,cur:0,ans:{},done:false,lbl:'M1-Rattrapage'});}

}
function vfDone(){

  const wrong=qs.flatMap((q,i)=>ans[i]!==q.a?[{level:'M2-VF',question:q.s,given:ans[i]?'TRUE':'FALSE',correct:q.a?'TRUE':'FALSE'}]:[]);
  S.wr.push(...wrong);S.res['M2-VF']={score,passed:pass(score)};S.l2s1=score;

/* ═══════ MATCHING ═══════ */
function vMatch(){
  const{ps,sh,sel,mt={},done=false}=E;if(!ps)return'';
  const used=Object.values(mt);
  const words=ps.map((p,i)=>{
    const isM=mt[i]!=null,ok=done&&mt[i]===i,ko=done&&isM&&mt[i]!==i;
    return`<div class="mi${sel===i?' msel':''}${isM&&!done?' mu':''}${ok?' mok':''}${ko?' mko':''}" onclick="${done||isM?'':(`selW(${i})`)}"  style="${ok?'border-color:var(--green)':ko?'border-color:var(--red)':''}">
      <strong style="flex:1">${p.w}</strong>
      ${isM&&!done?'<span style="color:var(--gd);font-size:.7rem">✓</span>':''}
      ${ok?'<span style="color:var(--green)">✓</span>':''}${ko?'<span style="color:var(--red)">✗</span>':''}
    </div>`;
  }).join('');
  const defs=sh.map(orig=>{
    const isU=used.includes(orig);
    const mKey=Object.keys(mt).find(k=>mt[k]===orig);
    const ok=done&&mKey!=null&&Number(mKey)===orig;
    const ko=done&&isU&&!ok;
    return`<div class="mi${isU&&!done?' mu':''}${ok?' mok':''}${ko?' mko':''}" onclick="${isU?'':(`selD(${orig})`)}" style="${ok?'border-color:var(--green)':ko?'border-color:var(--red)':''}">${ps[orig].d}</div>`;
  }).join('');
  const allM=Object.keys(mt).length===ps.length;
  const score=ps.filter((_,i)=>mt[i]===i).length;
  const bot=done
    ?`<div style="display:flex;gap:9px;width:100%;flex-wrap:wrap">${achvBanner(score)}<div style="display:flex;gap:8px;width:100%"><div class="${pass(score)?'ok':'ko'}" style="flex:1;margin:0">${score}/${ps.length} — ${pass(score)?'Mission réussie ✓':'Score insuffisant ✗'}</div>${btn('Continuer ›','matchDone()','nv')}</div></div>`
    :(allM?btn('Valider','E.done=true;render()','nv'):`<small style="color:#CCC;font-size:.78rem">${Object.keys(mt).length}/${ps.length} associés</small>`);
  return`<p style="color:#AAA;font-size:.79rem;margin-bottom:10px;font-weight:700">① Sélectionnez un terme → ② Sélectionnez sa définition</p>
  <div class="mg"><div><div style="font-weight:800;color:var(--nv);font-size:.69rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Termes</div>${words}</div>
  <div><div style="font-weight:800;color:var(--gd);font-size:.69rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Définitions</div>${defs}</div></div>
  <div style="margin-top:12px;display:flex;justify-content:flex-end">${bot}</div>`;
}
function selW(i){if(E.done||E.mt[i]!=null)return;E.sel=E.sel===i?null:i;render();}
function selD(orig){if(E.done||Object.values(E.mt||{}).includes(orig)||E.sel==null)return;if(!E.mt)E.mt={};E.mt[E.sel]=orig;E.sel=null;render();}
function matchDone(){
  const{ps,mt={},lbl=''}=E;
  const score=ps.filter((_,i)=>mt[i]===i).length;
  const wrong=ps.flatMap((p,i)=>mt[i]!==i?[{level:lbl,question:`Match: ${p.w}`,given:mt[i]!=null?ps[mt[i]]?.d:'—',correct:p.d}]:[]);
  S.wr.push(...wrong);
  if(S.scr==='l4e1'){S.res['M4-Ex1']={score,passed:pass(score)};if(pass(score)){S.pts+=50;go('l4d');}else go('l4e2',{ps:M2,sh:shuf(M2.map((_,i)=>i)),sel:null,mt:{},done:false,lbl:'M4-Rattrapage'});}
  else{S.res['M4-Ex2']={score,passed:pass(score)};if(pass(score))S.pts+=50;go('l4d');}
}

  <div style="background:var(--nv);border-radius:11px;padding:13px 20px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--gd2);margin-bottom:13px;letter-spacing:.04em;print-color-adjust:exact;-webkit-print-color-adjust:exact">✦ WELCOME EVERY GUEST WITH CARE</div>
  <div style="text-align:center;color:#BBB;font-size:.74rem">Créé par C. iemfre · The Meridian Hotel — English Escape Game · Bac Pro Métiers de l'Accueil</div>
  </div>`;
}

/* ═══════ RGPD ═══════ */
function vRGPD(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="card fadein" style="max-width:490px;width:100%;border-top:3px solid var(--gd)">
    <div style="color:#AAA;cursor:pointer;font-size:.82rem;margin-bottom:13px" onclick="go('home')">← Accueil</div>
    <div style="text-align:center;margin-bottom:17px"><div style="font-size:2.4rem">🔒</div>
      <h2 class="serif" style="color:var(--nv);margin-top:6px">Politique RGPD</h2>
    </div>
    <div style="background:var(--cr);border:1px solid var(--cr2);border-radius:10px;padding:15px;color:#555;line-height:1.88;font-size:.88rem">
      <p style="font-weight:700;color:#333;margin-bottom:9px">Cette page sera complétée ultérieurement.</p>
      <p>Les données saisies dans cette application (nom d'équipe, identifiants participants) ne sont pas transmises à des serveurs tiers et restent uniquement en mémoire locale durant la session.</p>
      <p style="margin-top:9px">Aucune donnée n'est conservée après fermeture de la page.</p>
    </div>
  </div></div>`;
}

/* ═══════ ROUTER ═══════ */
function go(scr,ei={}){E=ei;S.scr=scr;render();window.scrollTo(0,0);}
function render(){document.getElementById('app').innerHTML=view();}
function view(){
  const sc=S.scr;
  if(sc==='home')return vHome();
  if(sc==='rules')return vRules();
  if(sc==='rgpd')return vRGPD();
  if(sc==='tlg')return vLogin('Interface Direction','tdb');
  if(sc==='tdb')return vTeacher();
  if(sc==='slg')return vLogin('Enregistrement Équipe','grp');
  if(sc==='grp')return vGroup();
  const H=hdr;
  /* Mission 1 */
  if(sc==='l1i')return H(1)+`<div class="page">${lvlIntro('🎙️','Mission 1 — Front Desk Briefing','Vocabulaire hôtelier','<p style="font-weight:700;margin-bottom:7px">Welcome to The Meridian!</p><p style="font-size:.88rem;color:#555;line-height:1.72">Avant d\'accéder à la réception, prouvez que vous maîtrisez le vocabulaire essentiel de l\'hôtellerie. 10 questions · Seuil ≥ 8/10.</p>',"go('l1q1',{qs:Q1,cur:0,ans:{},done:false,lbl:'M1-Ex1'})")}</div>`;
  if(sc==='l1q1')return H(1)+`<div class="page"><div class="card card-nv"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--nv);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Ex. 1</span><strong style="font-size:.93rem">QCM — Vocabulaire hôtelier</strong></div>${vQCM()}</div></div>`;
  if(sc==='l1q2')return H(1)+`<div class="page"><div class="ko" style="margin-bottom:11px">Score insuffisant — exercice de rattrapage</div><div class="card card-gd"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--gd);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Rattrapage</span><strong style="font-size:.93rem">QCM — Vocabulaire (2)</strong></div>${vQCM()}</div></div>`;
  if(sc==='l1d')return H(1)+`<div class="page">${indiceScreen(0,"go('l2i')")}</div>`;
  /* Mission 2 */
  if(sc==='l2i')return H(2)+`<div class="page">${lvlIntro('📰','Mission 2 — Guest Intelligence','Compréhension écrite','<p style="font-weight:700;margin-bottom:7px">A guest file has been retrieved!</p><p style="font-size:.88rem;color:#555;line-height:1.72">Deux textes professionnels, deux exercices <strong>obligatoires</strong>. ≥ 8/10 aux deux pour avancer.</p><p style="color:var(--red);font-weight:700;font-size:.83rem;margin-top:8px">⚠ Échec = −25 pts + retour Mission 1</p>',"go('l2vf',{qs:VF,text:T1,ans:{},done:false})")}</div>`;
  if(sc==='l2vf')return H(2)+`<div class="page"><div class="card card-nv"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--nv);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Ex. 1 / 2</span><strong style="font-size:.93rem">Vrai / Faux — The Returns Desk</strong></div>${vVF()}</div></div>`;
  if(sc==='l2qm')return H(2)+`<div class="page"><div class="card card-nv"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--nv);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Ex. 2 / 2</span><strong style="font-size:.93rem">QCM — The Weekly Briefing</strong></div><div class="rtxt"><strong style="color:var(--gd);font-style:normal;font-size:.8rem">📄 The Weekly Front-of-House Briefing</strong><br><br>${T2.replace(/\n\n/g,'<br><br>')}</div>${vQCM()}</div></div>`;
  if(sc==='l2fl')return H(2)+`<div class="page"><div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:2.3rem;margin-bottom:8px">😓</div><h2 class="serif" style="color:var(--red);margin-bottom:10px">Score insuffisant</h2><p style="color:#555;margin-bottom:13px;font-size:.89rem">≥ 80% requis aux deux exercices pour accéder à la Mission 3.</p><div class="ko" style="margin-bottom:20px">−25 points appliqués · Retour Mission 1</div>${btn('Retour Mission 1',"go('l1i')",'red','lg')}</div></div>`;
  if(sc==='l2d')return H(2)+`<div class="page">${indiceScreen(1,"go('l3i')")}</div>`;
  /* Mission 3 */
  if(sc==='l3i')return H(3)+`<div class="page">${lvlIntro('🎤','Mission 3 — Live Situation','Expression orale','<p style="font-weight:700;margin-bottom:7px">A guest situation requires immediate attention!</p><p style="font-size:.88rem;color:#555;line-height:1.72">Un membre de l\'équipe est tiré au sort. Il lit la carte, puis gère la situation en anglais, sans notes ni préparation.</p>',"go('l3or',{step:'card'});S.l3i=0")}</div>`;
  if(sc==='l3or')return H(3)+`<div class="page">${vOral(SIT[S.l3i||0])}</div>`;
  if(sc==='l3d')return H(3)+`<div class="page">${indiceScreen(2,"go('l4i')")}</div>`;
  /* Mission 4 */
  if(sc==='l4i')return H(4)+`<div class="page">${lvlIntro('🔗','Mission 4 — The Concierge Desk','Correspondance terminologique','<p style="font-weight:700;margin-bottom:7px">The concierge files are scrambled!</p><p style="font-size:.88rem;color:#555;line-height:1.72">Associez chaque terme hôtelier à sa définition exacte. ⏱ 6 minutes recommandées · Seuil ≥ 8/10.</p>',"go('l4e1',{ps:M1,sh:shuf(M1.map((_,i)=>i)),sel:null,mt:{},done:false,lbl:'M4-Ex1'})")}</div>`;
  if(sc==='l4e1')return H(4)+`<div class="page"><div class="card card-nv"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--gd);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Ex. 1</span><strong style="font-size:.93rem">Correspondance — Série A</strong></div>${vMatch()}</div></div>`;
  if(sc==='l4e2')return H(4)+`<div class="page"><div class="ko" style="margin-bottom:11px">Score insuffisant — nouvelle série</div><div class="card card-gd"><div style="display:flex;gap:8px;align-items:center;margin-bottom:11px"><span style="background:var(--gd);color:#fff;padding:3px 12px;border-radius:5px;font-weight:800;font-size:.79rem">Rattrapage</span><strong style="font-size:.93rem">Correspondance — Série B</strong></div>${vMatch()}</div></div>`;
  if(sc==='l4d')return H(4)+`<div class="page">${indiceScreen(3,"go('l5i')")}</div>`;
  /* Mission 5 */
  if(sc==='l5i')return H(5)+`<div class="page">${lvlIntro('📋',"Mission 5 — The Duty Manager's Office",'Compte rendu oral','<p style="font-weight:700;margin-bottom:7px">The duty manager needs your report!</p><p style="font-size:.88rem;color:#555;line-height:1.72">Lisez la fiche d\'incident et présentez un compte rendu structuré en anglais. Langage professionnel exigé.</p>',"go('l5or',{step:'card'});S.l5i=0")}</div>`;
  if(sc==='l5or')return H(5)+`<div class="page">${vOral(REP[S.l5i||0],true)}</div>`;
  if(sc==='l5d')return H(5)+`<div class="page">${indiceScreen(4,"go('fin')")}</div>`;
  /* Final */
  if(sc==='fin')return H(5)+`<div class="page">${vFinal()}</div>`;
  if(sc==='vic')return H(5)+`<div class="page">${vVictory()}</div>`;
  if(sc==='rep')return vReport();
  return'<p>Écran inconnu</p>';
}
render();
</script></body></html>
